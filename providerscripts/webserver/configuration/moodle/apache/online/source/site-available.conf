TimeOut 45 
LimitRequestFields 50 
ServerTokens Minor
ServerName XXXXWEBSITEURLXXXX
SSLSessionCache "shmcb:logs/ssl_scache(512000)" 

<VirtualHost *:443>
        ServerAdmin webmaster@XXXXROOTDOMAINXXXX
        ServerName XXXXWEBSITEURLXXXX
        DocumentRoot /var/www/html
        ErrorLog ${APACHE_LOG_DIR}/error.log
  #      CustomLog ${APACHE_LOG_DIR}/access.log combined

     #   Protocols h2 http/1.1
     #   SSLEngine on
     #   SSLProtocol         -all +TLSv1.2 +TLSv1.3
     #   SSLCipherSuite      ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-SHA384:ECDHE-RSA-AES256-SHA384:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA256
     #   SSLHonorCipherOrder on
     #   SSLCompression      off
     #   SSLSessionTickets   off

        Protocols h2 http/1.1
        SSLCipherSuite EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH
            SSLProtocol All -SSLv2 -SSLv3 -TLSv1 -TLSv1.1
    SSLHonorCipherOrder On
    Header always set X-Frame-Options DENY
    Header always set X-Content-Type-Options nosniff
    SSLCompression off
    SSLUseStapling on
    SSLStaplingCache "shmcb:logs/stapling-cache(150000)"
    SSLSessionTickets Off
        SSLCertificateFile       XXXXHOMEXXXX/ssl/live/XXXXWEBSITEURLXXXX/fullchain.pem
        SSLCertificateKeyFile    XXXXHOMEXXXX/ssl/live/XXXXWEBSITEURLXXXX/privkey.pem

        <FilesMatch "\.(?:cgi|shtml|phtml|php)$">
                SSLOptions +StdEnvVars
        </FilesMatch>

        <Directory /usr/lib/cgi-bin>
                SSLOptions +StdEnvVars
        </Directory>

         XXXXFASTCGIXXXX

        <Directory /var/www/html>
                DirectoryIndex index.php
                LimitRequestBody 512000
                LimitXMLRequestBody 10485760
                AllowOverride ALL
                Options -Includes -ExecCGI -Indexes 
                Require all granted
        </Directory>
        <Directory /var/www/html/moodledata>
            Require all denied
        </Directory>


</VirtualHost>
