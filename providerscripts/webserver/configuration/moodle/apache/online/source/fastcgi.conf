<FilesMatch ".+\.ph(ar|p|tml)$">
    <If "-f %{REQUEST_FILENAME}">
      ProxyPassMatch "^/(.*\.php(/.*)?)$" "unix:/var/run/phpXXXXPHPVERSIONXXXX-fpm.sock|fcgi://127.0.0.1/var/www/html"
    </If>
</FilesMatch>

<FilesMatch ".+\.php$">
    <If "-f %{REQUEST_FILENAME}">
     # ProxyPassMatch ^/(.*\.php(/.*)?)$ fcgi://127.0.0.1:XXXXPORTXXXX//var/www/html/$1 
    SetHandler "fcgi://localhost:127.0.0.1:XXXXPORTXXXX"
    </If>
</FilesMatch>
