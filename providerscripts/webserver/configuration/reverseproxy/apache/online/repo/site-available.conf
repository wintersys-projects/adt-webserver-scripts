    <Proxy balancer://webservers_https>
        #XXXXWEBSERVERIPHTTPSXXXX

      #  BalancerMember http://0.0.0.0:8080/
      #  BalancerMember http://0.0.0.0:8081/
    </Proxy>
    

    Listen 443
    NameVirtualHost *:443
    <VirtualHost *:443>

    DocumentRoot "/var/www/html"

     SSLEngine on

     SSLCertificateFile       XXXXHOMEXXXX/ssl/live/XXXXWEBSITEURLXXXX/fullchain.pem
     SSLCertificateKeyFile    XXXXHOMEXXXX/ssl/live/XXXXWEBSITEURLXXXX/privkey.pem
        
     ProxyPass / balancer://webservers_https



ProxyRequests  off
ProxyPassMatch ^/(.*\.php)$ !
ProxyPass / http://localhost.main:8080/
ProxyPassReverse / http://localhost.main:8080/
ProxyPassReverseCookieDomain localhost.proxy localhost.main

    
    </VirtualHost>
