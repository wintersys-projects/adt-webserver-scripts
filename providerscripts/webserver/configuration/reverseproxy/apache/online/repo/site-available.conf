<IfModule mod_ssl.c>
    <VirtualHost *:443>
        ServerName XXXXWEBSITEURLXXXX
        DocumentRoot /var/www/html


        SSLEngine on
        SSLProxyEngine on
        SSLProxyVerify none
        SSLProxyCheckPeerCN off
        SSLProxyCheckPeerName off
        SSLProxyCheckPeerExpire off

     SSLCertificateFile       /home/X8oDV7ywrWGKx30PbUcX/ssl/live/www.nuocial.uk/fullchain.pem
     SSLCertificateKeyFile    /home/X8oDV7ywrWGKx30PbUcX/ssl/live/www.nuocial.uk/privkey.pem


        <Proxy "balancer://webservers_https">
            BalancerMember https://10.0.1.4:443
            ProxySet lbmethod=byrequests
        </Proxy>

        ProxyPreserveHost On
        ProxyPass / balancer://webservers_https/
        ProxyPassReverse / balancer://webservers_https/


    </VirtualHost>
</IfModule>
