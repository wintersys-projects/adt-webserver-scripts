    <Proxy balancer://webservers_https>
        #XXXXWEBSERVERIPHTTPSXXXX
    </Proxy>

    <Proxy balancer://webservers_php>
        #XXXXWEBSERVERIPPHPXXXX
    </Proxy>

    <VirtualHost *:443>

 ServerName XXXXWEBSITEURLXXXX


    Protocols h2 http/1.1
    Header always set Strict-Transport-Security "max-age=63072000"
    
        SSLEngine on
        SSLProxyEngine on
        SSLProxyVerify none
        SSLProxyCheckPeerCN off
        SSLProxyCheckPeerName off
        SSLProxyCheckPeerExpire off

     SSLCertificateFile       XXXXHOMEXXXX/ssl/live/XXXXWEBSITEURLXXXX/fullchain.pem
     SSLCertificateKeyFile    XXXXHOMEXXXX/ssl/live/XXXXWEBSITEURLXXXX/privkey.pem

    <FilesMatch "\.(cgi|shtml|phtml|php)$">
      SSLOptions +StdEnvVars
    </FilesMatch>

    <Directory /usr/lib/cgi-bin>
      SSLOptions +StdEnvVars
    </Directory>


 ProxyPassMatch ^/(.*\.php(/.*)?)$ balancer://webservers_php
 ProxyPassMatch / balancer://webservers_https

#<FilesMatch "\.php$">
#    SetHandler  "fcgi://10.0.1.4:9176/var/www/html"
#</FilesMatch>

        
    
    </VirtualHost>
