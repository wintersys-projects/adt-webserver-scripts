    <Proxy balancer://webservers_https>
        #XXXXWEBSERVERIPHTTPSXXXX

      #  BalancerMember http://0.0.0.0:8080/
      #  BalancerMember http://0.0.0.0:8081/
    </Proxy>
    

    Listen 443
     
    NameVirtualHost *:443
    <VirtualHost *:443>
    
        SSLEngine On
        
        # Set the path to SSL certificate
        # Usage: SSLCertificateFile /path/to/cert.pem
        SSLCertificateFile /etc/apache2/ssl/file.pem

        ssl_certificate XXXXHOMEXXXX/ssl/live/XXXXWEBSITEURLXXXX/fullchain.pem;
        ssl_certificate_key XXXXHOMEXXXX/ssl/live/XXXXWEBSITEURLXXXX/privkey.pem;
        
       
        
        # Or, balance the load:
        # ProxyPass / balancer://webservers_https
    
    </VirtualHost>
